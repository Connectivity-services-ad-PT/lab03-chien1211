name: Newman Contract Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  newman:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Lint OpenAPI Contracts
        run: npm run lint:contracts

      - name: Start Prism Mocks and Run Newman Tests
        run: |
          chmod +x ./scripts/start-prism-mock.sh
          # Khởi động mock servers ở chế độ ngầm
          ./scripts/start-prism-mock.sh all &
          
          # Đợi tối đa 30s để đảm bảo Prism đã bind thành công port 4010 (gate) và 4011 (vision)
          npx wait-on tcp:4010 tcp:4011 -t 30000
          
          # Tiến hành chạy test, lúc này servers chắc chắn đang sống
          npm run test:mock

      - name: Show Prism logs on failure
        if: failure()
        run: |
          cat prism-iot.log || true
          cat prism-vision.log || true

      - name: Upload Newman reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: newman-reports
          path: reports/
