name: Newman Contract Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  newman:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Lint OpenAPI Contracts
        run: npm run lint:contracts

      - name: Start Prism Mock Servers
        run: |
          chmod +x ./scripts/start-prism-mock.sh
          # start all mocks in background so the workflow can continue
          ./scripts/start-prism-mock.sh all &
          sleep 5 # wait for Prism to bind ports

      - name: Run Newman Tests against Gate Mock
        run: npm run test:mock

      - name: Show Prism logs on failure
        if: failure()
        run: |
          cat prism-iot.log || true
          cat prism-vision.log || true

      - name: Upload Newman reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: newman-reports
          path: reports/
